# HoverBot Driver Configuration Template
# Copy this file to your platform-specific config directory and customize
#
# Platform-specific copies:
#   - platforms/raspberry-pi4/config/hoverbot_driver.yaml
#   - platforms/raspberry-pi5/config/hoverbot_driver.yaml
#   - platforms/jetson-nano/config/hoverbot_driver.yaml

hoverbot_driver:
  ros__parameters:
    # Serial Communication
    # CHANGE THIS FOR YOUR PLATFORM:
    #   Raspberry Pi 4/5: '/dev/ttyAMA0'
    #   Jetson Nano:      '/dev/ttyTHS1'
    serial_port: '/dev/ttyAMA0'  # <-- UPDATE FOR YOUR PLATFORM
    baud_rate: 115200            # Must match firmware (don't change)

    # Robot Physical Parameters
    # These are universal across all platforms
    wheel_diameter: 0.165  # meters (16.5 cm hoverboard wheels)
    wheelbase: 0.40        # meters (40 cm track width)

    # Velocity Limits
    # Universal safety limits
    max_rpm: 300          # Maximum wheel speed in RPM (safety limit)
    # Calculated limits:
    # - Max linear velocity: ~0.26 m/s
    # - Max angular velocity: ~1.29 rad/s

    # Command Timeout
    cmd_vel_timeout: 0.5  # seconds - stop if no cmd_vel received

    # Publishing Options
    publish_odom: true    # Publish /odom topic
    publish_tf: true      # Broadcast odom→base_link transform

    # Frame IDs
    odom_frame: 'odom'
    base_frame: 'base_link'
